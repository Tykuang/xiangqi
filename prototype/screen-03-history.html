<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Screen 03 — Move History Panel</title>
<style>
:root{--dsv-blue:#002F6C;--dsv-blue-tint20:#004484;--dsv-white:#FFFFFF;--dsv-black:#000000;--dsv-red:#DA291C;--dsv-yellow:#FFCD00;--dsv-green:#00B050;--dsv-grey-90:#1A1A1A;--dsv-grey-50:#808080;--dsv-grey-10:#E5E5E5;--dsv-grey-5:#F2F2F2;--font:'Arial','Helvetica Neue',sans-serif;--cjk:'PingFang SC','Microsoft YaHei',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--dsv-grey-5);color:var(--dsv-grey-90);min-height:100vh;display:flex;flex-direction:column}
.topbar{height:64px;background:var(--dsv-blue);color:var(--dsv-white);display:flex;align-items:center;padding:0 32px;gap:24px}
.logo{display:flex;flex-direction:column;line-height:1}
.logo-mark{font-size:22px;font-weight:900;letter-spacing:-1px}
.logo-payoff{font-size:7px;letter-spacing:0.5px;margin-top:2px;opacity:0.85}
.game-title{font-family:var(--cjk);font-size:18px;font-weight:600;border-left:1px solid rgba(255,255,255,0.3);padding-left:16px;letter-spacing:1px}
.main{display:grid;grid-template-columns:repeat(12,1fr);gap:24px;padding:32px;max-width:1400px;margin:0 auto;width:100%;flex:1}
.board-area{grid-column:span 5;background:var(--dsv-white);border:1px solid var(--dsv-grey-10);padding:24px;display:flex;flex-direction:column;align-items:center}
.board-svg{border:2px solid var(--dsv-blue);background:var(--dsv-white);border-radius:4px}
.history-area{grid-column:span 7;display:flex;flex-direction:column;gap:16px}
.panel{background:var(--dsv-white);border:1px solid var(--dsv-grey-10);padding:0;display:flex;flex-direction:column;height:100%}
.panel-header{background:var(--dsv-blue);color:var(--dsv-white);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.panel-header h2{font-family:var(--cjk);font-size:16px;font-weight:600;letter-spacing:1px}
.panel-header .meta{font-size:10px;letter-spacing:2px;opacity:0.8}
.panel-tabs{display:flex;border-bottom:1px solid var(--dsv-grey-10);background:var(--dsv-grey-5)}
.panel-tabs .tab{padding:12px 20px;font-family:var(--cjk);font-size:13px;color:var(--dsv-grey-50);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:1px}
.panel-tabs .tab.active{color:var(--dsv-blue);background:var(--dsv-white);border-bottom:2px solid var(--dsv-blue);font-weight:600}
.panel-tabs .tab .count{margin-left:6px;font-size:10px;color:var(--dsv-grey-50);background:var(--dsv-grey-10);padding:2px 6px;border-radius:8px}
.panel-tabs .tab.active .count{background:var(--dsv-blue);color:var(--dsv-white)}
.history-grid{flex:1;overflow:hidden;padding:8px 0}
.history-row{display:grid;grid-template-columns:60px 1fr 1fr 60px;align-items:center;padding:8px 20px;font-family:var(--cjk);font-size:14px;border-bottom:1px solid var(--dsv-grey-5);transition:background 150ms}
.history-row:hover{background:var(--dsv-grey-5)}
.history-row.last{background:#FFF8DC}
.history-row .num{color:var(--dsv-grey-50);font-family:var(--font);font-size:12px;font-weight:600}
.history-row .red{color:var(--dsv-red);font-weight:500}
.history-row .black{color:var(--dsv-black);font-weight:500}
.history-row .icon{text-align:right;font-size:11px;color:var(--dsv-grey-50)}
.history-row .icon.capture{color:var(--dsv-red)}
.history-row .icon.check{color:var(--dsv-yellow)}
.panel-footer{padding:12px 20px;background:var(--dsv-grey-5);border-top:1px solid var(--dsv-grey-10);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--dsv-grey-50)}
.export-btn{background:transparent;border:1px solid var(--dsv-blue);color:var(--dsv-blue);padding:4px 12px;font-size:11px;cursor:pointer;border-radius:2px;letter-spacing:1px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <span class="logo-mark">DSV</span>
    <span class="logo-payoff">GLOBAL TRANSPORT AND LOGISTICS</span>
  </div>

</html>
