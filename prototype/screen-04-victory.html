<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Screen 04 — Victory Modal</title>
<style>
:root{--dsv-blue:#002F6C;--dsv-blue-tint20:#004484;--dsv-white:#FFFFFF;--dsv-black:#000000;--dsv-red:#DA291C;--dsv-yellow:#FFCD00;--dsv-green:#00B050;--dsv-grey-90:#1A1A1A;--dsv-grey-50:#808080;--dsv-grey-10:#E5E5E5;--dsv-grey-5:#F2F2F2;--font:'Arial','Helvetica Neue',sans-serif;--cjk:'PingFang SC','Microsoft YaHei',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--dsv-grey-5);min-height:100vh;display:flex;flex-direction:column}
.topbar{height:64px;background:var(--dsv-blue);color:var(--dsv-white);display:flex;align-items:center;padding:0 32px;gap:24px}
.logo{display:flex;flex-direction:column;line-height:1}
.logo-mark{font-size:22px;font-weight:900;letter-spacing:-1px}
.logo-payoff{font-size:7px;letter-spacing:0.5px;margin-top:2px;opacity:0.85}
.game-title{font-family:var(--cjk);font-size:18px;font-weight:600;border-left:1px solid rgba(255,255,255,0.3);padding-left:16px;letter-spacing:1px}
.turn-indicator{display:flex;align-items:center;gap:8px;margin-left:auto;background:rgba(255,255,255,0.1);padding:6px 14px;border-radius:2px;font-size:12px;letter-spacing:1px}
.turn-dot{width:10px;height:10px;border-radius:50%;background:var(--dsv-yellow);box-shadow:0 0 8px var(--dsv-yellow);animation:pulse 1.5s linear infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--dsv-yellow)}50%{box-shadow:0 0 16px var(--dsv-yellow),0 0 24px rgba(255,205,0,0.4)}}
.main{flex:1;padding:32px;display:flex;align-items:center;justify-content:center;position:relative}
.board-area{background:var(--dsv-white);border:1px solid var(--dsv-grey-10);padding:32px;filter:brightness(0.7);transition:filter 300ms}
.board-svg{border:2px solid var(--dsv-blue);background:var(--dsv-white);border-radius:4px}
.overlay{position:fixed;inset:0;background:rgba(0,47,108,0.55);display:flex;align-items:center;justify-content:center;z-index:100;animation:fade 300ms ease-out}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--dsv-white);width:480px;border-radius:4px;box-shadow:0 24px 48px rgba(0,0,0,0.4);overflow:hidden;animation:rise 300ms ease-out}
@keyframes rise{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-banner{background:var(--dsv-blue);color:var(--dsv-white);padding:32px 32px 24px;text-align:center;position:relative;overflow:hidden}
.modal-banner::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,205,0,0.15) 0%,transparent 60%)}
.modal-banner>*{position:relative}
.modal-banner .trophy{font-size:48px;margin-bottom:8px}
.modal-banner h1{font-family:var(--cjk);font-size:32px;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.modal-banner .subtitle{font-size:12px;letter-spacing:3px;opacity:0.8}
.modal-body{padding:24px 32px}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;text-align:center}
.result-stat{padding:12px;background:var(--dsv-grey-5);border-radius:2px}
.result-stat .label{font-size:10px;color:var(--dsv-grey-50);letter-spacing:1px;margin-bottom:4px}
.result-stat .value{font-family:var(--cjk);font-size:24px;font-weight:700;color:var(--dsv-blue)}
.result-stat .value.red{color:var(--dsv-red)}
.result-stat .value.black{color:var(--dsv-black)}
.final-move{background:#FFF8DC;border-left:3px solid var(--dsv-yellow);padding:12px 16px;margin-bottom:20px;font-family:var(--cjk);font-size:13px;color:var(--dsv-grey-90)}
.final-move strong{color:var(--dsv-red);font-weight:600}
.modal-actions{display:flex;gap:12px}
.btn{flex:1;padding:12px;font-size:14px;font-family:var(--cjk);font-weight:600;letter-spacing:1px;cursor:pointer;border-radius:2px;border:1px solid var(--dsv-blue);transition:all 200ms}
.btn.primary{background:var(--dsv-blue);color:var(--dsv-white)}
.btn.primary:hover{background:var(--dsv-blue-tint20)}
.btn.secondary{background:var(--dsv-white);color:var(--dsv-blue)}
.btn.secondary:hover{background:var(--dsv-grey-5)}
.modal-footer{background:var(--dsv-grey-5);padding:12px 32px;font-size:10px;color:var(--dsv-grey-50);text-align:center;letter-spacing:1px;border-top:1px solid var(--dsv-grey-10)}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <span class="logo-mark">DSV</span>
    <span class="logo-payoff">GLOBAL TRANSPORT AND LOGISTICS</span>
  </div>
  <div class="game-title">象棋 · XIANGQI</div>
  <div class="turn-indicator"><div class="turn-dot"></div><span>CHECK · 將軍</span></div>
</div>

<div class="main">
  <div class="board-area">
    <svg class="board-svg" width="540" height="600" viewBox="0 0 540 600">
      <g stroke="#B3B3B3" stroke-width="1" fill="none">
        <line x1="30" y1="30" x2="510" y2="30"/><line x1="30" y1="90" x2="510" y2="90"/>
        <line x1="30" y1="150" x2="510" y2="150"/><line x1="30" y1="210" x2="510" y2="210"/>
        <line x1="30" y1="270" x2="510" y2="270"/><line x1="30" y1="330" x2="510" y2="330"/>
        <line x1="30" y1="390" x2="510" y2="390"/><line x1="30" y1="450" x2="510" y2="450"/>
        <line x1="30" y1="510" x2="510" y2="510"/><line x1="30" y1="570" x2="510" y2="570"/>
        <line x1="30" y1="30" x2="30" y2="570"/><line x1="90" y1="30" x2="90" y2="570"/>
        <line x1="150" y1="30" x2="150" y2="570"/><line x1="210" y1="30" x2="210" y2="570"/>
        <line x1="270" y1="30" x2="270" y2="570"/><line x1="330" y1="30" x2="330" y2="570"/>
        <line x1="390" y1="30" x2="390" y2="570"/><line x1="450" y1="30" x2="450" y2="570"/>
        <line x1="510" y1="30" x2="510" y2="570"/>
        <line x1="210" y1="30" x2="330" y2="150"/><line x1="330" y1="30" x2="210" y2="150"/>
        <line x1="210" y1="450" x2="330" y2="570"/><line x1="330" y1="450" x2="210" y2="570"/>
      </g>
      <rect x="30" y="270" width="480" height="60" fill="white" opacity="0.95"/>
      <text x="180" y="305" font-family="'PingFang SC',serif" font-size="22" fill="#002F6C" font-weight="600" letter-spacing="20">楚 河</text>
      <text x="360" y="305" font-family="'PingFang SC',serif" font-size="22" fill="#002F6C" font-weight="600" letter-spacing="20">漢 界</text>
      <!-- last move yellow underline -->
      <line x1="244" y1="528" x2="304" y2="528" stroke="#FFCD00" stroke-width="3"/>
      <g font-family="'PingFang SC',serif" font-size="20" font-weight="700" text-anchor="middle" dominant-baseline="central">
        <!-- red pieces, mid-game end state -->
        <circle cx="330" cy="30" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="330" y="30" fill="#1A1A1A">車</text>
        <circle cx="30" cy="510" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="30" y="510" fill="#DA291C">俥</text>
        <circle cx="90" cy="450" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="90" y="450" fill="#DA291C">傌</text>
        <circle cx="270" cy="450" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="270" y="450" fill="#DA291C">相</text>
        <circle cx="450" cy="510" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="450" y="510" fill="#DA291C">俥</text>
        <circle cx="270" cy="510" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="270" y="510" fill="#DA291C">帥</text>
        <circle cx="150" cy="450" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="150" y="450" fill="#DA291C">仕</text>
        <circle cx="330" cy="450" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="330" y="450" fill="#DA291C">仕</text>
        <circle cx="510" cy="450" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="510" y="450" fill="#DA291C">兵</text>
        <circle cx="90" cy="390" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="90" y="390" fill="#DA291C">兵</text>
        <circle cx="330" cy="390" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="330" y="390" fill="#DA291C">兵</text>
        <circle cx="450" cy="390" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="450" y="390" fill="#DA291C">兵</text>
        <circle cx="510" cy="330" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="510" y="330" fill="#DA291C">炮</text>
        <circle cx="270" cy="330" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="270" y="330" fill="#DA291C">炮</text>
        <circle cx="90" cy="210" r="22" fill="white" stroke="#DA291C" stroke-width="2"/><text x="90" y="210" fill="#DA291C">炮</text>
        <!-- black: rook already moved, only 將 left in palace under attack -->
        <circle cx="210" cy="90" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="210" y="90" fill="#1A1A1A">車</text>
        <circle cx="450" cy="90" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="450" y="90" fill="#1A1A1A">車</text>
        <circle cx="270" cy="90" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="270" y="90" fill="#1A1A1A">將</text>
        <circle cx="150" cy="30" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="150" y="30" fill="#1A1A1A">士</text>
        <circle cx="390" cy="30" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="390" y="30" fill="#1A1A1A">士</text>
        <circle cx="270" cy="270" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="270" y="270" fill="#1A1A1A">卒</text>
        <!-- check ring on black 將 -->
        <circle cx="270" cy="90" r="28" fill="none" stroke="#FFCD00" stroke-width="3" opacity="0.9"/>
        <circle cx="270" cy="90" r="28" fill="none" stroke="#FFCD00" stroke-width="3" opacity="0.6" transform="scale(1.2)" transform-origin="270 90"/>
      </g>
    </svg>
  </div>
</div>

<div class="overlay">
  <div class="modal">
    <div class="modal-banner">
      <div class="trophy">♛</div>
      <h1>紅方勝</h1>
      <div class="subtitle">RED WINS · CHECKMATE</div>
    </div>
    <div class="modal-body">
      <div class="result-stats">
        <div class="result-stat">
          <div class="label">回合</div>
          <div class="value">32</div>
        </div>
        <div class="result-stat">
          <div class="label">總步數</div>
          <div class="value">48</div>
        </div>
        <div class="result-stat">
          <div class="label">用時</div>
          <div class="value">12:35</div>
        </div>
      </div>
      <div class="final-move">
        <strong>絕殺 · </strong> 炮五進四 將軍,黑將無可移動,紅方 <strong>將死</strong> 對方
      </div>
      <div class="modal-actions">
        <button class="btn primary">↻ 新對局 NEW GAME</button>
        <button class="btn secondary">⤺ 復 盤 REVIEW</button>
      </div>
    </div>
    <div class="modal-footer">DSV XIANGQI · 2026 · GAME OVER</div>
  </div>
</div>
</body>
</html>
