<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Screen 05 — Mobile Responsive</title>
<style>
:root{--dsv-blue:#002F6C;--dsv-blue-tint20:#004484;--dsv-white:#FFFFFF;--dsv-black:#000000;--dsv-red:#DA291C;--dsv-yellow:#FFCD00;--dsv-grey-90:#1A1A1A;--dsv-grey-50:#808080;--dsv-grey-10:#E5E5E5;--dsv-grey-5:#F2F2F2;--font:'Arial','Helvetica Neue',sans-serif;--cjk:'PingFang SC','Microsoft YaHei',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--dsv-grey-5);color:var(--dsv-grey-90);display:flex;flex-direction:column}
.topbar{height:48px;background:var(--dsv-blue);color:var(--dsv-white);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.logo{display:flex;flex-direction:column;line-height:1}
.logo-mark{font-size:14px;font-weight:900;letter-spacing:-0.5px}
.logo-payoff{font-size:5px;letter-spacing:0.5px;margin-top:1px;opacity:0.85}
.game-title{font-family:var(--cjk);font-size:12px;font-weight:600;border-left:1px solid rgba(255,255,255,0.3);padding-left:8px;letter-spacing:0.5px;flex:1}
.icon-btn{background:transparent;border:1px solid rgba(255,255,255,0.5);color:var(--dsv-white);padding:3px 8px;font-size:10px;font-family:var(--font);border-radius:2px;cursor:pointer}
.icon-btn.primary{background:var(--dsv-white);color:var(--dsv-blue);font-weight:600;border-color:var(--dsv-white)}
.turn-pill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.1);padding:3px 8px;border-radius:2px;font-size:9px;letter-spacing:0.5px}
.turn-dot{width:6px;height:6px;border-radius:50%;background:var(--dsv-red)}
.board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;overflow:hidden}
.board-svg{border:2px solid var(--dsv-blue);background:var(--dsv-white);border-radius:4px;width:min(95vw,calc(100vh - 200px));height:auto;aspect-ratio:9/10}
.bottom-bar{background:var(--dsv-white);border-top:1px solid var(--dsv-grey-10);flex-shrink:0}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--dsv-grey-10)}
.tab{padding:8px 4px;text-align:center;font-family:var(--cjk);font-size:10px;color:var(--dsv-grey-50);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:0.5px}
.tab.active{color:var(--dsv-blue);border-bottom-color:var(--dsv-blue);font-weight:600}
.tab .icon{display:block;font-size:14px;margin-bottom:2px}
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px}
.action-btn{background:var(--dsv-grey-5);border:1px solid var(--dsv-grey-10);padding:8px 4px;font-family:var(--cjk);font-size:10px;color:var(--dsv-grey-90);border-radius:2px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.action-btn .icon{font-size:14px;color:var(--dsv-blue)}
.action-btn.danger .icon{color:var(--dsv-red)}
.status-strip{background:var(--dsv-blue-tint20);color:var(--dsv-white);padding:6px 12px;font-family:var(--cjk);font-size:11px;display:flex;align-items:center;gap:8px;letter-spacing:0.5px}
.status-strip .badge{background:var(--dsv-yellow);color:var(--dsv-blue);padding:2px 6px;font-size:9px;font-weight:700;border-radius:2px;letter-spacing:1px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <span class="logo-mark">DSV</span>
    <span class="logo-payoff">GLOBAL TRANSPORT AND LOGISTICS</span>
  </div>
  <div class="game-title">象棋</div>
  <div class="turn-pill"><div class="turn-dot"></div>紅方</div>
  <button class="icon-btn">↻</button>
</div>

<div class="status-strip">
  <span class="badge">將軍</span>

      <circle cx="510" cy="30" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="510" y="30" fill="#1A1A1A">車</text>
      <circle cx="90" cy="210" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="90" y="210" fill="#1A1A1A">砲</text>
      <circle cx="450" cy="210" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="450" y="210" fill="#1A1A1A">砲</text>

      <circle cx="510" cy="270" r="22" fill="white" stroke="#1A1A1A" stroke-width="2"/><text x="510" y="270" fill="#1A1A1A">卒</text>

<div class="bottom-bar">
  <div class="tabs">
    <div class="tab active"><span class="icon">♟</span>棋盤</div>
    <div class="tab"><span class="icon">≡</span>歷史</div>
    <div class="tab"><span class="icon">⚙</span>設置</div>
    <div class="tab"><span class="icon">ⓘ</span>關於</div>
  </div>
  <div class="quick-actions">
    <div class="action-btn"><span class="icon">↶</span>悔棋</div>
    <div class="action-btn"><span class="icon">⇄</span>換邊</div>
    <div class="action-btn"><span class="icon">↻</span>新局</div>
    <div class="action-btn danger"><span class="icon">⊘</span>認輸</div>
  </div>
</div>
</body>
</html>
