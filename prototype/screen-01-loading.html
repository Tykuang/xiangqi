<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Screen 01 — Loading / Splash</title>
<style>
:root{--dsv-blue:#002F6C;--dsv-blue-tint20:#004484;--dsv-white:#FFFFFF;--dsv-black:#000000;--dsv-red:#DA291C;--dsv-yellow:#FFCD00;--dsv-green:#00B050;--dsv-grey-90:#1A1A1A;--dsv-grey-50:#808080;--dsv-grey-10:#E5E5E5;--dsv-grey-5:#F2F2F2;--font:'Arial','Helvetica Neue',sans-serif;--cjk:'PingFang SC','Microsoft YaHei',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--dsv-blue);color:var(--dsv-white);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:64px;background:var(--dsv-blue);border-bottom:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;padding:0 32px;gap:16px}
.logo{display:flex;flex-direction:column;line-height:1}
.logo-mark{font-size:24px;font-weight:900;letter-spacing:-1px}
.logo-payoff{font-size:8px;font-weight:400;letter-spacing:0.5px;margin-top:2px;opacity:0.85}
.splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;position:relative}
.splash::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(255,205,0,0.08) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(218,41,28,0.06) 0%,transparent 50%)}
.splash>*{position:relative;z-index:1}
.splash-title{font-family:var(--cjk);font-size:64px;font-weight:700;letter-spacing:-2px}
.splash-sub{font-family:var(--cjk);font-size:18px;opacity:0.7;margin-top:-24px}
.splash-loader{display:flex;align-items:center;gap:16px;font-size:14px;letter-spacing:1px}
.spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--dsv-yellow);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.splash-pieces{display:flex;gap:8px;margin-top:16px;opacity:0.4}
.splash-pieces span{width:36px;height:36px;border-radius:50%;background:var(--dsv-white);color:var(--dsv-red);display:flex;align-items:center;justify-content:center;font-family:var(--cjk);font-weight:700;font-size:16px}
.splash-pieces span.b{color:var(--dsv-black)}
.splash-meta{position:absolute;bottom:24px;font-size:10px;letter-spacing:2px;opacity:0.5}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <span class="logo-mark">DSV</span>
    <span class="logo-payoff">GLOBAL TRANSPORT AND LOGISTICS</span>
  </div>
</div>
<div class="splash">
  <div class="splash-title">象棋 · Xiangqi</div>
  <div class="splash-sub">DSV Brand Edition · v1.0</div>
  <div class="splash-loader"><div class="spinner"></div><span>LOADING GAME…</span></div>
  <div class="splash-pieces">
    <span>帥</span><span>車</span><span class="b">將</span><span class="b">馬</span><span>炮</span><span class="b">砲</span>
  </div>
  <div class="splash-meta">© DSV 2026 · CHESS OF LOGISTICS</div>
</div>
</body>
</html>
